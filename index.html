<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#020617" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Galaxia" />
    <meta name="description" content="Galaxia neon space arcade shooter" />
    <title>Galaxia</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/icon-192.png" sizes="192x192" type="image/png" />
    <link rel="icon" href="/icon-512.png" sizes="512x512" type="image/png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <script>
      (() => {
        const setViewportHeight = () => {
          document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`);
        };
        setViewportHeight();
        window.addEventListener('resize', setViewportHeight, { passive: true });
        window.addEventListener('orientationchange', setViewportHeight, { passive: true });

        window.enterFullscreen = () => {
          const element = document.documentElement;
          if (!element.requestFullscreen) return Promise.resolve();
          return element.requestFullscreen({ navigationUI: 'hide' });
        };
      })();
    </script>
  </head>
  <body>
    <div id="splash-screen" aria-live="polite" aria-label="Preparing Galaxia">
      <picture aria-hidden="true">
        <source srcset="/Assets/splash_1080w_q82.webp" type="image/webp" />
        <img src="/Assets/Splash_Screen.png" alt="" />
      </picture>
      <div id="loading-container">
        <p id="loading-kicker">Flight systems</p>
        <p id="loading-text">INITIALIZING...</p>
        <div id="loading-bar-bg" role="progressbar" aria-label="Loading progress" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
          <div id="loading-bar-fg"></div>
        </div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js').catch(() => undefined));
      }
    </script>
  </body>
</html>
